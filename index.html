                                        const diff = kpisB.fgKg - kpisA.fgKg;
                                        const percentDiff = (diff / kpisA.fgKg) * 100;
                                        const isBetter = diff >= 0;
                                        return (
                                            <div className={`flex items-center gap-2 ${isBetter ? 'text-green-600' : 'text-red-600'}`}>
                                                {isBetter ? '▲' : '▼'}
                                                <span className="font-bold">{Math.abs(percentDiff).toFixed(2)}%</span>
                                                <span className="text-sm">({isBetter ? '+' : ''}{formatNum(diff)} kg)</span>
                                            </div>
                                        );
                                    })()}
                                </div>

                                {/* Scrap Comparison */}
                                <div className="bg-white p-5 rounded-xl shadow-sm border-t-4 border-red-500">
                                    <h3 className="text-gray-500 font-semibold mb-2">Scrap (%)</h3>
                                    <div className="flex justify-between items-end mb-4 border-b pb-4">
                                        <div>
                                            <p className="text-xs text-gray-400">ช่วงเวลา 1</p>
                                            <p className="text-xl font-bold text-gray-800">{formatNum(kpisA.scrapPercent)}%</p>
                                        </div>
                                        <div className="text-right">
                                            <p className="text-xs text-gray-400">ช่วงเวลา 2</p>
                                            <p className="text-xl font-bold text-gray-800">{formatNum(kpisB.scrapPercent)}%</p>
                                        </div>
                                    </div>
                                    {(() => {
                                        if (kpisA.fgKg === 0 && kpisB.fgKg === 0) return <p className="text-sm text-gray-400">-</p>;
                                        const diff = kpisB.scrapPercent - kpisA.scrapPercent;
                                        const isBetter = diff <= 0; // Scrap ลดลงคือดี
                                        return (
                                            <div className={`flex items-center gap-2 ${isBetter ? 'text-green-600' : 'text-red-600'}`}>
                                                {isBetter ? '▼ลดลง (ดี)' : '▲เพิ่มขึ้น (แย่)'}
                                                <span className="font-bold">{Math.abs(diff).toFixed(2)}%</span>
                                            </div>
                                        );
                                    })()}
                                </div>

                                {/* Rework Comparison */}
                                <div className="bg-white p-5 rounded-xl shadow-sm border-t-4 border-orange-400">
                                    <h3 className="text-gray-500 font-semibold mb-2">Rework (%)</h3>
                                    <div className="flex justify-between items-end mb-4 border-b pb-4">
                                        <div>
                                            <p className="text-xs text-gray-400">ช่วงเวลา 1</p>
                                            <p className="text-xl font-bold text-gray-800">{formatNum(kpisA.reworkPercent)}%</p>
                                        </div>
                                        <div className="text-right">
                                            <p className="text-xs text-gray-400">ช่วงเวลา 2</p>
                                            <p className="text-xl font-bold text-gray-800">{formatNum(kpisB.reworkPercent)}%</p>
                                        </div>
                                    </div>
                                    {(() => {
                                        if (kpisA.fgKg === 0 && kpisB.fgKg === 0) return <p className="text-sm text-gray-400">-</p>;
                                        const diff = kpisB.reworkPercent - kpisA.reworkPercent;
                                        const isBetter = diff <= 0; // Rework ลดลงคือดี
                                        return (
                                            <div className={`flex items-center gap-2 ${isBetter ? 'text-green-600' : 'text-red-600'}`}>
                                                {isBetter ? '▼ลดลง (ดี)' : '▲เพิ่มขึ้น (แย่)'}
                                                <span className="font-bold">{Math.abs(diff).toFixed(2)}%</span>
                                            </div>
                                        );
                                    })()}
                                </div>
                            </div>

                            {/* Machine Detail Comparison */}
                            <div className="bg-white p-5 rounded-xl shadow-sm">
                                <h3 className="text-lg font-bold text-gray-800 mb-4">สรุปรายเครื่องจักร (ช่วงที่ 1 vs ช่วงที่ 2)</h3>
                                <div className="overflow-x-auto rounded-lg border border-gray-200">
                                    <table className="w-full text-left border-collapse">
                                        <thead className="bg-gray-100 text-gray-700 text-sm">
                                            <tr>
                                                <th className="p-3 border-b border-r" rowSpan="2">เครื่องจักร</th>
                                                <th className="p-3 border-b border-r text-center bg-blue-50 text-blue-800" colSpan="2">FG (kg)</th>
                                                <th className="p-3 border-b border-r text-center bg-red-50 text-red-800" colSpan="3">Scrap % (เศษเสีย)</th>
                                            </tr>
                                            <tr>
                                                <th className="p-2 border-b border-r text-right bg-blue-50 text-xs">ช่วงที่ 1</th>
                                                <th className="p-2 border-b border-r text-right bg-blue-50 text-xs">ช่วงที่ 2</th>
                                                <th className="p-2 border-b border-r text-right bg-red-50 text-xs">ช่วงที่ 1</th>
                                                <th className="p-2 border-b border-r text-right bg-red-50 text-xs">ช่วงที่ 2</th>
                                                <th className="p-2 border-b border-r text-center bg-red-50 text-xs">สถานะ</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {compMachineStats.map((m, i) => {
                                                const scrapDiff = m.scrapB - m.scrapA;
                                                const hasData = m.fgA > 0 || m.fgB > 0;
                                                
                                                return (
                                                    <tr key={i} className="border-b hover:bg-gray-50 text-sm transition-colors">
                                                        <td className="p-3 border-r text-gray-800 font-medium">{m.name}</td>
                                                        <td className="p-3 border-r text-right text-gray-600">{formatNum(m.fgA)}</td>
                                                        <td className="p-3 border-r text-right text-blue-600 font-medium">{formatNum(m.fgB)}</td>
                                                        
                                                        <td className="p-3 border-r text-right text-gray-600">{formatNum(m.scrapA)}%</td>
                                                        <td className="p-3 border-r text-right text-red-500 font-medium">{formatNum(m.scrapB)}%</td>
                                                        <td className="p-3 border-r text-center">
                                                            {hasData ? (
                                                                scrapDiff > 0 ? (
                                                                    <span className="bg-red-100 text-red-700 px-2 py-1 rounded text-xs">แย่ลง (+{formatNum(scrapDiff)}%)</span>
                                                                ) : scrapDiff < 0 ? (
                                                                    <span className="bg-green-100 text-green-700 px-2 py-1 rounded text-xs">ดีขึ้น ({formatNum(scrapDiff)}%)</span>
                                                                ) : (
                                                                    <span className="text-gray-400 text-xs">คงที่</span>
                                                                )
                                                            ) : (
                                                                <span className="text-gray-300">-</span>
                                                            )}
                                                        </td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    )}


                    {/* Problem Details Modal (For Machine Click) */}
                    {modalData && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
                            <div className="bg-white rounded-xl shadow-xl max-w-4xl w-full max-h-[90vh] overflow-y-auto">
                                <div className="flex justify-between items-center p-4 border-b sticky top-0 bg-white">

                                        สรุปปัญหาและสาเหตุ: เครื่อง {modalData.machine}

                                        <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/></svg>
                                    </button>
                                </div>
                                <div className="p-4">

                                                    <tr className="bg-gray-100 text-gray-700 text-sm">
                                                        <th className="p-3 border">อาการของปัญหา</th>
                                                        <th className="p-3 border">สาเหตุ</th>
                                                        <th className="p-3 border text-right">เศษเสีย (kg)</th>
                                                        <th className="p-3 border text-right">% เศษเสีย (เทียบ FG)</th>
                                                        <th className="p-3 border text-right">ม้วนแก้ไข (kg)</th>
                                                        <th className="p-3 border text-right">% ม้วนแก้ไข (เทียบ FG)</th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {modalData.problems.map((p, i) => (
                                                        <tr key={i} className="border-b hover:bg-gray-50 text-sm">
                                                            <td className="p-3 border text-gray-800 font-medium">{p.symptom}</td>
                                                            <td className="p-3 border text-gray-600">{p.cause}</td>
                                                            <td className="p-3 border text-right font-semibold text-red-600">{formatNum(p.scrapKg)}</td>
                                                            <td className="p-3 border text-right text-red-500">{formatNum(p.scrapPercentOfFG)}%</td>
                                                            <td className="p-3 border text-right font-semibold text-orange-500">{formatNum(p.reworkKg)}</td>
                                                            <td className="p-3 border text-right text-orange-400">{formatNum(p.reworkPercentOfFG)}%</td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    ) : (
                                        <p className="text-center text-gray-500 py-8">ไม่พบข้อมูลการบันทึกสาเหตุของเสียที่ระบุไว้สำหรับเครื่องนี้</p>

                                </div>
                            </div>
                        </div>

                                <div className="flex justify-between items-center p-4 border-b sticky top-0 bg-white">
                                    <div>
                                        <h2 className="text-lg font-bold text-gray-800 leading-tight">

                                        <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/></svg>
                                    </button>
                                </div>
                                <div className="p-4">
                                    <h3 className="text-sm font-semibold text-gray-700 mb-3">แยกตามเครื่องจักรที่พบปัญหา:</h3>
                                    <div className="overflow-hidden rounded-lg border border-gray-200">
                                        <table className="w-full text-left border-collapse">
                                            <thead>
                                                <tr className="bg-gray-50 text-gray-700 text-sm border-b">
                                                    <th className="p-3 border-r">เครื่องจักร</th>
                                                    <th className="p-3 border-r text-right">เศษเสีย (kg)</th>
                                                    <th className="p-3 border-r text-right">% เศษเสีย (เทียบปัญหานี้)</th>
                                                    <th className="p-3 border-r text-right">ม้วนแก้ไข (kg)</th>
                                                    <th className="p-3 text-right">% ม้วนแก้ไข (เทียบปัญานี้)</th>

                                                {problemModalData.machines.map((m, i) => (
                                                    <tr key={i} className="border-b hover:bg-gray-50 text-sm last:border-0">
                                                        <td className="p-3 border-r text-gray-800 font-medium">{m.machine}</td>
                                                        <td className="p-3 border-r text-right text-red-600">{formatNum(m.scrap)}</td>
                                                        <td className="p-3 border-r text-right text-red-500">{formatNum(m.scrapPercent)}%</td>
                                                        <td className="p-3 border-r text-right text-orange-500">{formatNum(m.rework)}</td>
                                                        <td className="p-3 text-right text-orange-400">{formatNum(m.reworkPercent)}%</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Customer Details Modal (For Customer Bar Click) */}
                    {customerModalData && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
                            <div className="bg-white rounded-xl shadow-xl max-w-3xl w-full max-h-[90vh] overflow-y-auto">
                                <div className="flex justify-between items-center p-4 border-b sticky top-0 bg-white">
                                    <h2 className="text-xl font-bold text-gray-800">
                                        รายละเอียดขนาด: ลูกค้า {customerModalData.name}
                                    </h2>
                                    <button onClick={() => setCustomerModalData(null)} className="text-gray-500 hover:text-gray-700 bg-gray-100 hover:bg-gray-200 rounded-full p-1 transition-colors">
                                        <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12"/></svg>
                                    </button>
                                </div>
                                <div className="p-4">
                                    <div className="overflow-x-auto rounded-lg border border-gray-200">
                                        <table className="w-full text-left border-collapse">
                                            <thead>
                                                <tr className="bg-gray-100 text-gray-700 text-sm">
                                                    <th className="p-3 border-b border-r">ขนาด</th>
                                                    <th className="p-3 border-b border-r text-right text-blue-700">FG (kg)</th>
                                                    <th className="p-3 border-b border-r text-right text-red-600">เศษเสีย (kg)</th>
                                                    <th className="p-3 border-b text-right text-orange-500">ม้วนแก้ไข (kg)</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {customerModalData.sizeDetails.map((s, i) => (
                                                    <tr key={i} className="border-b hover:bg-gray-50 text-sm last:border-0">
                                                        <td className="p-3 border-r text-gray-800 font-medium">{s.size}</td>
                                                        <td className="p-3 border-r text-right text-blue-600 font-medium">{formatNum(s.FG)}</td>
                                                        <td className="p-3 border-r text-right text-red-500">{formatNum(s.Scrap)}</td>
                                                        <td className="p-3 text-right text-orange-500">{formatNum(s.Rework)}</td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
