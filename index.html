
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Production Report Dashboard</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM (Pinned to 18.2.0 for stability) -->
    <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
    
    <!-- Dependencies Required by Recharts UMD -->
    <script crossorigin src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-is@18.2.0/umd/react-is.production.min.js"></script>

    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Recharts (Pinned to 2.1.12 for stable UMD build) -->
    <script src="https://unpkg.com/recharts@2.1.12/umd/Recharts.js"></script>

    <!-- PapaParse for CSV reading -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Sarabun', sans-serif; background-color: #f3f4f6; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- Supabase Configuration ---
        const SUPABASE_URL = "https://ecsvgwhzfbhlbcnpcpzl.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVjc3Znd2h6ZmJobGJjbnBjcHpsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc4NTk5MDAsImV4cCI6MjA5MzQzNTkwMH0.OGQgd5H7M3-yq7iqw0I-0oULAt02qcdBx4AL_hN_rzE";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const Recharts = window.Recharts || {};
        const { 
            BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer, 
            ComposedChart, Line, Cell
        } = Recharts;

        // --- Helper Functions ---
        const parseNum = (val) => {
            if (!val) return 0;
            const num = parseFloat(String(val).replace(/,/g, ''));
            return isNaN(num) ? 0 : num;
        };

        const formatNum = (num, decimals = 2) => {
            return num.toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: decimals });
        };

        const formatDateForDB = (dateStr) => {
            if (!dateStr || typeof dateStr !== 'string') return null;
            // Handle formats like DD/MM/YYYY or D/M/YYYY
            const parts = dateStr.trim().split('/');
            if (parts.length === 3) {
                let [d, m, y] = parts;
                d = d.padStart(2, '0');
                m = m.padStart(2, '0');
                let year = parseInt(y);
                // Convert BE (พ.ศ.) to AD (ค.ศ.) if year > 2400
                if (year > 2400) year -= 543;
                return `${year}-${m}-${d}`;
            }
            // If already YYYY-MM-DD
            if (/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) return dateStr;
            return dateStr;
        };

        const ALL_MACHINES = ['BL01','BL02','BL03','BL04','BL05','BL06','BL07','BL08','BL09','BL10','BL11'];

        // --- Main Component ---
        const App = () => {
            const [rawData, setRawData] = useState([]);
            const [isLoading, setIsLoading] = useState(true);
            const [isSyncing, setIsSyncing] = useState(false);
            const [isDragging, setIsDragging] = useState(false);
            
            // --- Fetch Data from Supabase ---
            const fetchData = async () => {
                setIsLoading(true);
                try {
                    const { data, error } = await supabaseClient
                        .from('production_records')
                        .select('*')
                        .order('production_date', { ascending: false });

                    if (error) throw error;

                    // Map snake_case from DB back to camelCase used in UI
                    const mappedData = data.map(item => ({
                        date: item.production_date,
                        machine: item.machine,
                        customer: item.customer,
                        size: item.size,
                        fgKg: item.fg_kg,
                        fgRolls: item.fg_rolls,
                        scrapKg: item.scrap_kg,
                        reworkKg: item.rework_kg,
                        symptom: item.symptom,
                        cause: item.cause,
                        shift: item.shift,
                        orderNo: item.order_no
                    }));

                    setRawData(mappedData);
                } catch (err) {
                    console.error('Error fetching data:', err.message);
                    alert('ไม่สามารถดึงข้อมูลจาก Database ได้: ' + err.message);
                } finally {
                    setIsLoading(false);
                }
            };

            useEffect(() => {
                fetchData();
            }, []);
            
            // Tabs State
            const [activeTab, setActiveTab] = useState('dashboard');

            // Filters State
            const [filters, setFilters] = useState({
                startDate: '',
                endDate: '',
                machine: 'All',
                customer: 'All',
                size: 'All',
                shift: 'All'
            });
            const [searchQuery, setSearchQuery] = useState('');

            // Comparison State
            const [compA, setCompA] = useState({ start: '', end: '' });
            const [compB, setCompB] = useState({ start: '', end: '' });

            // Modal States
            const [modalData, setModalData] = useState(null); // Machine modal
            const [problemModalData, setProblemModalData] = useState(null); // Problem modal
            const [customerModalData, setCustomerModalData] = useState(null); // Customer modal

            // Reset Filters
            const resetFilters = () => {
                setFilters({ startDate: '', endDate: '', machine: 'All', customer: 'All', size: 'All', shift: 'All' });
                setSearchQuery('');
            };

            // File Upload Handler
            const handleFileUpload = (e) => {
                const files = e.target.files || e.dataTransfer.files;
                if (!files.length) return;

                setIsSyncing(true);
                let filesProcessed = 0;
                let allNewRecords = [];

                Array.from(files).forEach(file => {
                    Papa.parse(file, {
                        header: true,
                        skipEmptyLines: true,
                        complete: async (results) => {
                            const processedForDB = results.data
                                .filter(row => row['วันที่ผลิต'])
                                .map(row => ({
                                    production_date: formatDateForDB(row['วันที่ผลิต']),
                                    machine: row['เครื่องจักร'] || 'Unknown',
                                    customer: row['ลูกค้า'] || 'Unknown',
                                    size: row['ขนาด'] || 'Unknown',
                                    fg_kg: parseNum(row['จำนวนที่ผลิตได้ (kg)']),
                                    fg_rolls: parseNum(row['จำนวนที่ผลิตได้ (ม้วน)']),
                                    scrap_kg: parseNum(row['น้ำหนักเศษของเสีย (kg)']),
                                    rework_kg: parseNum(row['น้ำหนักม้วนรอแก้ไข (kg)']),
                                    symptom: row['อาการของปัญหา'] || 'ไม่มีระบุ',
                                    cause: row['สาเหตุ'] || 'ไม่มีระบุ',
                                    shift: row['กะ'] || 'Unknown',
                                    order_no: row['เลขที่ใบสั่งผลิต'] || ''
                                }));
                            
                            if (processedForDB.length > 0) {
                                // Deduplicate records within the same file before upserting
                                // to avoid "ON CONFLICT DO UPDATE command cannot affect row a second time"
                                const uniqueRecordsMap = new Map();
                                processedForDB.forEach(record => {
                                    // Create a unique key based on the same fields as the DB constraint
                                    const key = `${record.production_date}|${record.machine}|${record.order_no}|${record.shift}|${record.customer}|${record.size}`;
                                    
                                    if (uniqueRecordsMap.has(key)) {
                                        const existing = uniqueRecordsMap.get(key);
                                        // Aggregate numeric fields
                                        existing.fg_kg = (existing.fg_kg || 0) + (record.fg_kg || 0);
                                        existing.fg_rolls = (existing.fg_rolls || 0) + (record.fg_rolls || 0);
                                        existing.scrap_kg = (existing.scrap_kg || 0) + (record.scrap_kg || 0);
                                        existing.rework_kg = (existing.rework_kg || 0) + (record.rework_kg || 0);
                                        
                                        // Join symptoms and causes
                                        if (record.symptom && record.symptom !== 'ไม่มีระบุ' && !existing.symptom.includes(record.symptom)) {
                                            existing.symptom = existing.symptom === 'ไม่มีระบุ' ? record.symptom : `${existing.symptom}; ${record.symptom}`;
                                        }
                                        if (record.cause && record.cause !== 'ไม่มีระบุ' && !existing.cause.includes(record.cause)) {
                                            existing.cause = existing.cause === 'ไม่มีระบุ' ? record.cause : `${existing.cause}; ${record.cause}`;
                                        }
                                    } else {
                                        uniqueRecordsMap.set(key, { ...record });
                                    }
                                });


                                const deduplicatedRecords = Array.from(uniqueRecordsMap.values());

                                const { error } = await supabaseClient
                                    .from('production_records')
                                    .upsert(deduplicatedRecords, { 
                                        onConflict: 'production_date, machine, order_no, shift, customer, size' 
                                    });

                                if (error) {
                                    console.error('Upsert error:', error.message);
                                    alert('Error saving data to database: ' + error.message);
                                }
                            }

                            filesProcessed++;
                            if (filesProcessed === files.length) {
                                setIsSyncing(false);
                                fetchData(); // Refresh data from server
                            }
                        }
                    });
                });
            };

            // Drag and Drop Handlers
            const onDragOver = (e) => { e.preventDefault(); setIsDragging(true); };
            const onDragLeave = () => setIsDragging(false);
            const onDrop = (e) => { e.preventDefault(); setIsDragging(false); handleFileUpload(e); };

            // Data Filtering
            const filteredData = useMemo(() => {
                return rawData.filter(row => {
                    if (filters.machine !== 'All' && row.machine !== filters.machine) return false;
                    if (filters.customer !== 'All' && row.customer !== filters.customer) return false;
                    if (filters.size !== 'All' && row.size !== filters.size) return false;
                    if (filters.shift !== 'All' && row.shift !== filters.shift) return false;
                    
                    if (filters.startDate && new Date(row.date) < new Date(filters.startDate)) return false;
                    if (filters.endDate && new Date(row.date) > new Date(filters.endDate)) return false;

                    if (searchQuery) {
                        const q = searchQuery.toLowerCase();
                        const match = 
                            row.customer.toLowerCase().includes(q) ||
                            row.size.toLowerCase().includes(q) ||
                            row.date.toLowerCase().includes(q) ||
                            row.orderNo.toLowerCase().includes(q);
                        if (!match) return false;
                    }

                    return true;
                });
            }, [rawData, filters, searchQuery]);

            // Unique options for dropdowns
            const options = useMemo(() => ({
                machines: ['All', ...new Set(rawData.map(d => d.machine).filter(Boolean))].sort(),
                customers: ['All', ...new Set(rawData.map(d => d.customer).filter(Boolean))].sort(),
                sizes: ['All', ...new Set(rawData.map(d => d.size).filter(Boolean))].sort(),
                shifts: ['All', ...new Set(rawData.map(d => d.shift).filter(Boolean))].sort(),
            }), [rawData]);

            // --- Reusable KPI Function ---
            const calcKPIs = (data) => {
                let fgKg = 0, fgRolls = 0, scrapKg = 0, reworkKg = 0;
                data.forEach(d => {
                    fgKg += d.fgKg;
                    fgRolls += d.fgRolls;
                    scrapKg += d.scrapKg;
                    reworkKg += d.reworkKg;
                });
                const totalOutput = fgKg + scrapKg + reworkKg;
                const scrapPercent = fgKg > 0 ? (scrapKg / fgKg) * 100 : 0;
                const reworkPercent = fgKg > 0 ? (reworkKg / fgKg) * 100 : 0;
                
                const fgPercentOfOutput = totalOutput > 0 ? (fgKg / totalOutput) * 100 : 0;
                const lossPercentOfOutput = totalOutput > 0 ? ((scrapKg + reworkKg) / totalOutput) * 100 : 0;

                return { fgKg, fgRolls, totalOutput, scrapKg, reworkKg, scrapPercent, reworkPercent, fgPercentOfOutput, lossPercentOfOutput };
            };

            // --- KPIs Calculation ---
            const kpis = useMemo(() => calcKPIs(filteredData), [filteredData]);

            // --- Comparison Data Preparation ---
            const compDataA = useMemo(() => rawData.filter(row => {
                if (compA.start && new Date(row.date) < new Date(compA.start)) return false;
                if (compA.end && new Date(row.date) > new Date(compA.end)) return false;
                return true;
            }), [rawData, compA]);

            const compDataB = useMemo(() => rawData.filter(row => {
                if (compB.start && new Date(row.date) < new Date(compB.start)) return false;
                if (compB.end && new Date(row.date) > new Date(compB.end)) return false;
                return true;
            }), [rawData, compB]);

            const kpisA = useMemo(() => calcKPIs(compDataA), [compDataA]);
            const kpisB = useMemo(() => calcKPIs(compDataB), [compDataB]);

            // --- AI Summary Insights Calculation ---
            const summaryInsights = useMemo(() => {
                if (filteredData.length === 0) return null;

                const machineMap = {};
                filteredData.forEach(d => {
                    if (!machineMap[d.machine]) {
                        machineMap[d.machine] = {
                            machine: d.machine,
                            fgKg: 0,
                            scrapKg: 0,
                            reworkKg: 0,
                            fgJobs: {},
                            lossJobs: {},
                            symptoms: {}
                        };
                    }
                    const m = machineMap[d.machine];
                    m.fgKg += d.fgKg;
                    m.scrapKg += d.scrapKg;
                    m.reworkKg += d.reworkKg;

                    const jobKey = `${d.customer} | ${d.size}`;

                    if (d.fgKg > 0) {
                        m.fgJobs[jobKey] = (m.fgJobs[jobKey] || 0) + d.fgKg;
                    }
                    
                    const loss = d.scrapKg + d.reworkKg;
                    if (loss > 0) {
                        m.lossJobs[jobKey] = (m.lossJobs[jobKey] || 0) + loss;
                        if (d.symptom && d.symptom !== 'ไม่มีระบุ') {
                            m.symptoms[d.symptom] = (m.symptoms[d.symptom] || 0) + loss;
                        }
                    }
                });

                const machines = Object.values(machineMap);

                // Top 3 Machines by FG
                let top3FGMachines = [];
                if (machines.length > 0) {
                    const sortedByFG = [...machines].sort((a, b) => b.fgKg - a.fgKg).slice(0, 3);
                    top3FGMachines = sortedByFG.map(m => {
                        if (m.fgKg > 0) {
                            const topJob = Object.entries(m.fgJobs).sort((a,b)=>b[1]-a[1])[0];
                            const [topCustomer, topSize] = topJob ? topJob[0].split(' | ') : ['-', '-'];
                            return {
                                ...m,
                                topCustomer,
                                topSize,
                                scrapPercent: (m.scrapKg / m.fgKg) * 100,
                                reworkPercent: (m.reworkKg / m.fgKg) * 100
                            };
                        }
                        return null;
                    }).filter(Boolean);
                }

                // Top 3 Worst Machines by Loss
                let top3LossMachines = [];
                if (machines.length > 0) {
                    const sortedByLoss = [...machines].sort((a, b) => (b.scrapKg + b.reworkKg) - (a.scrapKg + a.reworkKg)).slice(0, 3);
                    top3LossMachines = sortedByLoss.map(m => {
                        const totalLoss = m.scrapKg + m.reworkKg;
                        if (totalLoss > 0) {
                            const topLossJob = Object.entries(m.lossJobs).sort((a,b)=>b[1]-a[1])[0];
                            const [topCustomer, topSize] = topLossJob ? topLossJob[0].split(' | ') : ['-', '-'];

                            // Calculate top symptoms for this machine
                            const sortedSymptoms = Object.entries(m.symptoms)
                                .map(([symptom, weight]) => ({
                                    symptom,
                                    weight,
                                    percentOfMachineLoss: (weight / totalLoss) * 100
                                }))
                                .sort((a, b) => b.weight - a.weight)
                                .slice(0, 5); // Get top 5

                            return {
                                ...m,
                                topCustomer,
                                topSize,
                                topSymptomsList: sortedSymptoms,
                                lossPercent: m.fgKg > 0 ? (totalLoss / m.fgKg) * 100 : 0,
                                scrapPercent: m.fgKg > 0 ? (m.scrapKg / m.fgKg) * 100 : 0,
                                reworkPercent: m.fgKg > 0 ? (m.reworkKg / m.fgKg) * 100 : 0
                            };
                        }
                        return null;
                    }).filter(Boolean);
                }

                return { top3FGMachines, top3LossMachines };
            }, [filteredData]);

            const getMachineStats = (data) => {
                const map = {};
                ALL_MACHINES.forEach(m => map[m] = { name: m, FG: 0, Scrap: 0, Rework: 0 });
                data.forEach(d => {
                    if (!map[d.machine]) map[d.machine] = { name: d.machine, FG: 0, Scrap: 0, Rework: 0 };
                    map[d.machine].FG += d.fgKg;
                    map[d.machine].Scrap += d.scrapKg;
                    map[d.machine].Rework += d.reworkKg;
                });
                return Object.values(map).map(m => ({
                    ...m,
                    scrapPercent: m.FG > 0 ? (m.Scrap / m.FG) * 100 : 0,
                    reworkPercent: m.FG > 0 ? (m.Rework / m.FG) * 100 : 0
                })).sort((a, b) => a.name.localeCompare(b.name));
            };

            const compMachineStats = useMemo(() => {
                const statsA = getMachineStats(compDataA);
                const statsB = getMachineStats(compDataB);
                return statsA.map((a, i) => {
                    const b = statsB[i];
                    return {
                        name: a.name,
                        fgA: a.FG, fgB: b.FG,
                        scrapA: a.scrapPercent, scrapB: b.scrapPercent,
                        reworkA: a.reworkPercent, reworkB: b.reworkPercent
                    };
                });
            }, [compDataA, compDataB]);

            // --- Chart Data Preparation ---

            // 1. FG vs Scrap vs Rework by Machine (Show ALL BL01-BL11)
            const machineStats = useMemo(() => {
                const map = {};
                // Initialize all BL01-BL11
                ALL_MACHINES.forEach(m => map[m] = { name: m, FG: 0, Scrap: 0, Rework: 0 });
                
                filteredData.forEach(d => {
                    // Include any machine even if it's not in the predefined list, but ensure predefined ones stay
                    if (!map[d.machine]) map[d.machine] = { name: d.machine, FG: 0, Scrap: 0, Rework: 0 };
                    map[d.machine].FG += d.fgKg;
                    map[d.machine].Scrap += d.scrapKg;
                    map[d.machine].Rework += d.reworkKg;
                });
                // Sort keeping standard machines first, then others
                return Object.values(map).sort((a, b) => a.name.localeCompare(b.name));
            }, [filteredData]);

            // 2. All Customers (Overall) - Highest to Lowest with details
            const customerStats = useMemo(() => {
                 const map = {};
                 let overallTotalFG = 0;
                 filteredData.forEach(d => {
                    overallTotalFG += d.fgKg;
                    if (!map[d.customer]) map[d.customer] = { name: d.customer, FG: 0, Scrap: 0, Rework: 0, sizes: {} };
                    map[d.customer].FG += d.fgKg;
                    map[d.customer].Scrap += d.scrapKg;
                    map[d.customer].Rework += d.reworkKg;
                    
                    const sName = d.size && d.size !== 'Unknown' ? d.size : 'ไม่ระบุขนาด';
                    if (!map[d.customer].sizes[sName]) map[d.customer].sizes[sName] = { FG: 0, Scrap: 0, Rework: 0 };
                    map[d.customer].sizes[sName].FG += d.fgKg;
                    map[d.customer].sizes[sName].Scrap += d.scrapKg;
                    map[d.customer].sizes[sName].Rework += d.reworkKg;
                 });
                 
                 return Object.values(map)
                    .map(c => ({
                        ...c,
                        sizeDetails: Object.entries(c.sizes).map(([sizeName, stats]) => ({
                            size: sizeName,
                            FG: stats.FG,
                            Scrap: stats.Scrap,
                            Rework: stats.Rework,
                            percentOfOverallFG: overallTotalFG > 0 ? (stats.FG / overallTotalFG) * 100 : 0
                        })).sort((a,b) => b.FG - a.FG)
                    }))
                    .sort((a, b) => b.FG - a.FG);
            }, [filteredData]);

            // Table Data for Customer & Size & Date breakdown
            const customerSizeDateTableData = useMemo(() => {
                const map = {};
                let overallTotalFG = 0;
                filteredData.forEach(d => {
                    overallTotalFG += d.fgKg;
                    const cName = d.customer || 'Unknown';
                    const sName = d.size && d.size !== 'Unknown' ? d.size : 'ไม่ระบุขนาด';
                    const dDate = d.date || 'ไม่ระบุวันที่';
                    const key = `${cName}|${sName}|${dDate}`;

                    if (!map[key]) {
                        map[key] = { customer: cName, size: sName, date: dDate, FG: 0, Scrap: 0, Rework: 0 };
                    }
                    map[key].FG += d.fgKg;
                    map[key].Scrap += d.scrapKg;
                    map[key].Rework += d.reworkKg;
                });

                return Object.values(map).map(row => ({
                    ...row,
                    percentOverall: overallTotalFG > 0 ? (row.FG / overallTotalFG) * 100 : 0,
                    percentScrap: row.FG > 0 ? (row.Scrap / row.FG) * 100 : 0,
                    percentRework: row.FG > 0 ? (row.Rework / row.FG) * 100 : 0
                })).sort((a, b) => {
                    // เรียงตามวันที่ (ล่าสุดขึ้นก่อน) แล้วค่อยเรียงตาม FG จากมากไปน้อย
                    const dateA = new Date(a.date);
                    const dateB = new Date(b.date);
                    if (dateB - dateA !== 0) return dateB - dateA;
                    return b.FG - a.FG;
                });
            }, [filteredData]);

            // 3. Top Symptoms/Causes (Loss Kg)
            const problemStats = useMemo(() => {
                 const map = {};
                 let totalLoss = 0;
                 filteredData.forEach(d => {
                    const lossKg = d.scrapKg + d.reworkKg;
                    totalLoss += lossKg;
                    if (lossKg > 0 && d.symptom && d.symptom !== 'ไม่มีระบุ') {
                        const causeText = (d.cause && d.cause !== 'ไม่มีระบุ') ? ` (${d.cause})` : '';
                        const key = `${d.symptom}${causeText}`;
                        if (!map[key]) map[key] = { name: key, lossKg: 0, symptom: d.symptom, cause: d.cause };
                        map[key].lossKg += lossKg;
                    }
                 });
                 
                 return Object.values(map)
                    .map(p => ({
                        ...p,
                        percentOfTotalLoss: totalLoss > 0 ? (p.lossKg / totalLoss) * 100 : 0
                    }))
                    .sort((a, b) => b.lossKg - a.lossKg); // Sort by loss desc
            }, [filteredData]);


            // Custom Tooltip for Customer Chart
            const CustomerTooltip = ({ active, payload }) => {
                if (active && payload && payload.length) {
                    const data = payload[0].payload;
                    return (
                        <div className="bg-white p-3 border shadow-lg rounded-lg text-sm z-50 max-w-sm">
                            <p className="font-bold text-gray-800 border-b pb-1 mb-2">{data.name}</p>
                            <p className="text-blue-600 font-medium">✅ รวม FG: {formatNum(data.FG)} kg</p>
                            <p className="text-red-500 font-medium">🗑️ รวมเศษเสีย: {formatNum(data.Scrap)} kg</p>
                            <p className="text-orange-500 font-medium">⚠️ รวมม้วนแก้ไข: {formatNum(data.Rework)} kg</p>
                            <p className="text-gray-500 text-xs mt-2 font-medium">👉 คลิกที่แท่งกราฟเพื่อดูรายละเอียดแต่ละขนาด</p>
                        </div>
                    );
                }
                return null;
            };

            // Custom Tooltip for Problem Chart
            const ProblemTooltip = ({ active, payload }) => {
                if (active && payload && payload.length) {
                    const data = payload[0].payload;
                    return (
                        <div className="bg-white p-3 border shadow-lg rounded-lg text-sm z-50">
                            <p className="font-bold text-gray-800 mb-1">{data.name}</p>
                            <p className="text-red-600 font-bold">สูญเสีย: {formatNum(data.lossKg)} kg</p>
                            <p className="text-gray-500 text-xs">คิดเป็น {formatNum(data.percentOfTotalLoss)}% ของเศษเสียทั้งหมด</p>
                            <p className="text-blue-500 text-xs mt-2 font-medium">👉 คลิกที่แท่งกราฟเพื่อดูรายละเอียดเครื่องจักร</p>
                        </div>
                    );
                }
                return null;
            };

            // Modals Logic
            const openCustomerDetails = (data) => {
                setCustomerModalData(data);
            };

            const openMachineDetails = (data) => {
                const machineName = data.name; 
                const machineData = filteredData.filter(d => d.machine === machineName);
                let totalMachineFG = 0;
                const problemMap = {};

                machineData.forEach(d => {
                    totalMachineFG += d.fgKg;
                    const lossKg = d.scrapKg + d.reworkKg;
                    if (lossKg > 0 && d.symptom && d.symptom !== 'ไม่มีระบุ') {
                        const key = `${d.symptom} | ${d.cause}`;
                        if (!problemMap[key]) problemMap[key] = { symptom: d.symptom, cause: d.cause, scrapKg: 0, reworkKg: 0 };
                        problemMap[key].scrapKg += d.scrapKg;
                        problemMap[key].reworkKg += d.reworkKg;
                    }
                });

                const problems = Object.values(problemMap)
                    .map(p => ({
                        ...p,
                        scrapPercentOfFG: totalMachineFG > 0 ? (p.scrapKg / totalMachineFG) * 100 : 0,
                        reworkPercentOfFG: totalMachineFG > 0 ? (p.reworkKg / totalMachineFG) * 100 : 0
                    }))
                    .sort((a, b) => (b.scrapKg + b.reworkKg) - (a.scrapKg + a.reworkKg));

                setModalData({ machine: machineName, problems, totalFG: totalMachineFG });
            };

            const openProblemDetails = (data) => {
                const problemName = data.name;
                const relatedData = filteredData.filter(d => {
                    const loss = d.scrapKg + d.reworkKg;
                    const causeText = (d.cause && d.cause !== 'ไม่มีระบุ') ? ` (${d.cause})` : '';
                    const key = `${d.symptom}${causeText}`;
                    return loss > 0 && key === problemName;
                });

                const machineMap = {};
                relatedData.forEach(d => {
                    if(!machineMap[d.machine]) machineMap[d.machine] = { scrap: 0, rework: 0 };
                    machineMap[d.machine].scrap += d.scrapKg;
                    machineMap[d.machine].rework += d.reworkKg;
                });

                const machinesBreakdown = Object.entries(machineMap)
                    .map(([m, vals]) => ({
                        machine: m, 
                        scrap: vals.scrap,
                        rework: vals.rework,
                        total: vals.scrap + vals.rework,
                        scrapPercent: data.lossKg > 0 ? (vals.scrap / data.lossKg) * 100 : 0,
                        reworkPercent: data.lossKg > 0 ? (vals.rework / data.lossKg) * 100 : 0
                    }))
                    .sort((a,b)=>b.total - a.total);

                setProblemModalData({
                    problem: problemName,
                    totalKg: data.lossKg,
                    percent: data.percentOfTotalLoss,
                    machines: machinesBreakdown
                });
            };

            // --- Render Helpers ---
            if (!window.Recharts || Object.keys(Recharts).length === 0) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-gray-100">
                        <div className="bg-white p-8 rounded-xl shadow-lg max-w-md text-center">
                            <h2 className="text-xl font-bold text-red-600 mb-2">ระบบไม่สามารถโหลดไลบรารีกราฟได้</h2>
                            <p className="text-gray-600">กรุณาตรวจสอบการเชื่อมต่ออินเทอร์เน็ตของท่าน หรือรีเฟรชหน้าเว็บใหม่อีกครั้ง</p>
                        </div>
                    </div>
                );
            }

            if (isLoading) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-gray-100">
                        <div className="flex flex-col items-center gap-4">
                            <div className="w-12 h-12 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>
                            <p className="text-gray-600 font-medium">กำลังโหลดข้อมูลจาก Database...</p>
                        </div>
                    </div>
                );
            }

            if (rawData.length === 0) {
                return (
                    <div 
                        className={`min-h-screen flex items-center justify-center transition-colors ${isDragging ? 'bg-blue-50' : 'bg-gray-100'}`}
                        onDragOver={onDragOver} onDragLeave={onDragLeave} onDrop={onDrop}
                    >
                        <div className="bg-white p-10 rounded-2xl shadow-xl text-center border-2 border-dashed border-gray-300 max-w-lg w-full">
                            <svg className="w-16 h-16 text-blue-500 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" /></svg>
                            <h2 className="text-2xl font-bold mb-2 text-gray-800">ระบบรายงานการผลิต</h2>
                            <p className="text-gray-500 mb-6">กรุณาอัปโหลดไฟล์ CSV เพื่อบันทึกข้อมูลลงใน Supabase</p>
                            <label className="cursor-pointer bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg shadow transition-colors inline-block">
                                {isSyncing ? 'กำลังบันทึกลง Database...' : 'เลือกไฟล์ CSV เพื่อบันทึก'}
                                <input type="file" accept=".csv" multiple className="hidden" onChange={handleFileUpload} disabled={isSyncing} />
                            </label>
                            <p className="mt-4 text-sm text-gray-400">หรือลากไฟล์มาวางที่นี่ (ข้อมูลจะถูกซิงค์กับ Cloud)</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen p-4 md:p-6 flex flex-col gap-6">
                    {/* Header & Global Search */}
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 bg-white p-4 rounded-xl shadow-sm">
                        <div>
                            <h1 className="text-2xl font-bold text-gray-800">📊 Production Dashboard</h1>
                            <p className="text-sm text-gray-500">ข้อมูลรวมทั้งหมด {rawData.length} รายการ | แสดงผล {filteredData.length} รายการ</p>
                        </div>
                        
                        <div className="flex flex-col md:flex-row gap-3 w-full md:w-auto">
                            <input 
                                type="text" 
                                placeholder="🔍 ค้นหา ลูกค้า, ขนาด, วันที่, ใบสั่ง..." 
                                className="px-4 py-2 border rounded-lg w-full md:w-64 focus:outline-none focus:ring-2 focus:ring-blue-500"
                                value={searchQuery}
                                onChange={(e) => setSearchQuery(e.target.value)}
                            />
                            <label className={`cursor-pointer ${isSyncing ? 'bg-gray-400' : 'bg-emerald-600 hover:bg-emerald-700'} text-white px-4 py-2 rounded-lg shadow transition-colors flex items-center justify-center gap-2 whitespace-nowrap`}>
                                <svg className={`w-4 h-4 ${isSyncing ? 'animate-spin' : ''}`} fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    {isSyncing ? (
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
                                    ) : (
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M12 4v16m8-8H4"/>
                                    )}
                                </svg>
                                {isSyncing ? 'กำลังซิงค์...' : 'อัปโหลดเพิ่ม'}
                                <input type="file" accept=".csv" multiple className="hidden" onChange={handleFileUpload} disabled={isSyncing} />
                            </label>
                        </div>
                    </div>

                    {/* Navigation Tabs */}
                    <div className="flex gap-2 bg-gray-200 p-1 rounded-lg w-fit">
                        <button 
                            onClick={() => setActiveTab('dashboard')}
                            className={`px-6 py-2 rounded-md font-semibold transition-colors ${activeTab === 'dashboard' ? 'bg-white text-blue-700 shadow-sm' : 'text-gray-600 hover:bg-gray-300'}`}
                        >
                            📊 Dashboard ภาพรวม
                        </button>
                        <button 
                            onClick={() => setActiveTab('comparison')}
                            className={`px-6 py-2 rounded-md font-semibold transition-colors ${activeTab === 'comparison' ? 'bg-white text-blue-700 shadow-sm' : 'text-gray-600 hover:bg-gray-300'}`}
                        >
                            ⚖️ เปรียบเทียบประสิทธิภาพ
                        </button>
                    </div>

                    {/* ======================= TAB 1: DASHBOARD ======================= */}
                    {activeTab === 'dashboard' && (
                        <div className="flex flex-col gap-6 animate-[fadeIn_0.3s_ease-in-out]">
                            {/* Filters */}
                            <div className="bg-white p-4 rounded-xl shadow-sm">
                                <div className="flex justify-between items-center mb-3">
                                    <h3 className="font-semibold text-gray-700">ตัวกรองข้อมูล</h3>
                                    <button onClick={resetFilters} className="text-sm text-red-500 hover:text-red-700 hover:underline flex items-center gap-1">
                                        <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                                        ล้างค่า (Reset)
                                    </button>
                                </div>
                                <div className="grid grid-cols-2 md:grid-cols-6 gap-3">
                                    <div>
                                        <label className="text-xs text-gray-500 mb-1 block">ตั้งแต่วันที่</label>
                                        <input type="date" className="w-full border rounded p-1.5 text-sm" value={filters.startDate} onChange={e => setFilters({...filters, startDate: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="text-xs text-gray-500 mb-1 block">ถึงวันที่</label>
                                        <input type="date" className="w-full border rounded p-1.5 text-sm" value={filters.endDate} onChange={e => setFilters({...filters, endDate: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="text-xs text-gray-500 mb-1 block">เครื่องจักร</label>
                                        <select className="w-full border rounded p-1.5 text-sm" value={filters.machine} onChange={e => setFilters({...filters, machine: e.target.value})}>
                                            {options.machines.map(m => <option key={m} value={m}>{m === 'All' ? 'ทั้งหมด' : m}</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="text-xs text-gray-500 mb-1 block">ลูกค้า</label>
                                        <select className="w-full border rounded p-1.5 text-sm" value={filters.customer} onChange={e => setFilters({...filters, customer: e.target.value})}>
                                            {options.customers.map(m => <option key={m} value={m}>{m === 'All' ? 'ทั้งหมด' : m}</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="text-xs text-gray-500 mb-1 block">ขนาด</label>
                                        <select className="w-full border rounded p-1.5 text-sm" value={filters.size} onChange={e => setFilters({...filters, size: e.target.value})}>
                                            {options.sizes.map(m => <option key={m} value={m}>{m === 'All' ? 'ทั้งหมด' : (m.length > 20 ? m.substring(0,20)+'...' : m)}</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="text-xs text-gray-500 mb-1 block">กะ</label>
                                        <select className="w-full border rounded p-1.5 text-sm" value={filters.shift} onChange={e => setFilters({...filters, shift: e.target.value})}>
                                            {options.shifts.map(m => <option key={m} value={m}>{m === 'All' ? 'ทั้งหมด' : m}</option>)}
                                        </select>
                                    </div>
                                </div>
                            </div>

                            {/* KPI Cards */}
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                                <div className="bg-white p-5 rounded-xl shadow-sm border-l-4 border-blue-500">
                                    <p className="text-gray-500 text-sm font-medium">FG</p>
                                    <div className="mt-2 flex items-baseline gap-2">
                                        <h3 className="text-2xl font-bold text-gray-800">{formatNum(kpis.fgKg)} <span className="text-base font-normal text-gray-500">kg</span></h3>
                                    </div>
                                    <p className="text-sm text-blue-600 mt-1 font-medium">{formatNum(kpis.fgRolls, 0)} ม้วน</p>
                                </div>

                                <div className="bg-white p-5 rounded-xl shadow-sm border-l-4 border-purple-500">
                                    <p className="text-gray-500 text-sm font-medium">Total Output</p>
                                    <div className="mt-2 flex items-baseline gap-2">
                                        <h3 className="text-2xl font-bold text-gray-800">{formatNum(kpis.totalOutput)} <span className="text-base font-normal text-gray-500">kg</span></h3>
                                    </div>
                                    {/* Dual Progress Bar */}
                                    <div className="w-full bg-red-500 flex rounded-full h-1.5 mt-3 overflow-hidden">
                                        <div className="bg-purple-500 h-1.5" style={{width: `${kpis.fgPercentOfOutput}%`}}></div>
                                    </div>
                                    <p className="text-xs mt-1 font-medium">
                                        <span className="text-purple-600">FG: {formatNum(kpis.fgPercentOfOutput)}%</span>
                                        <span className="mx-2 text-gray-300">|</span>
                                        <span className="text-red-500">สูญเสีย: {formatNum(kpis.lossPercentOfOutput)}%</span>
                                    </p>
                                </div>

                                <div className="bg-white p-5 rounded-xl shadow-sm border-l-4 border-red-500">
                                    <p className="text-gray-500 text-sm font-medium">Scrap</p>
                                    <div className="mt-2 flex items-baseline gap-2">
                                        <h3 className="text-2xl font-bold text-gray-800">{formatNum(kpis.scrapKg)} <span className="text-base font-normal text-gray-500">kg</span></h3>
                                    </div>
                                    <p className={`text-sm mt-1 font-bold ${kpis.scrapPercent > 5 ? 'text-red-600' : 'text-orange-500'}`}>
                                        {formatNum(kpis.scrapPercent)}% <span className="text-xs font-normal text-gray-500">ของ FG</span>
                                    </p>
                                </div>

                                <div className="bg-white p-5 rounded-xl shadow-sm border-l-4 border-orange-400">
                                    <p className="text-gray-500 text-sm font-medium">Rework</p>
                                    <div className="mt-2 flex items-baseline gap-2">
                                        <h3 className="text-2xl font-bold text-gray-800">{formatNum(kpis.reworkKg)} <span className="text-base font-normal text-gray-500">kg</span></h3>
                                    </div>
                                    <p className="text-sm mt-1 font-bold text-orange-500">
                                        {formatNum(kpis.reworkPercent)}% <span className="text-xs font-normal text-gray-500">ของ FG</span>
                                    </p>
                                </div>
                            </div>

                            {/* Summary Insights Text Card (Top 3) */}
                            {summaryInsights && (summaryInsights.top3FGMachines.length > 0 || summaryInsights.top3LossMachines.length > 0) && (
                                <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                                    <h3 className="text-lg font-bold text-gray-800 mb-4 border-b pb-2 flex items-center gap-2">
                                        <svg className="w-5 h-5 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                                        สรุปข้อมูลเชิงลึก (Insights 3 อันดับ)
                                    </h3>
                                    <div className="grid grid-cols-1 xl:grid-cols-2 gap-6">
                                        {/* Top 3 FG Machines Insight */}
                                        {summaryInsights.top3FGMachines.length > 0 && (
                                            <div className="bg-emerald-50/70 p-4 rounded-lg border border-emerald-100">
                                                <div className="flex items-center gap-2 mb-3">
                                                    <span className="text-2xl">🏆</span>
                                                    <h4 className="font-bold text-emerald-800 text-lg">3 อันดับเครื่องจักรยอดเยี่ยม (FG สูงสุด)</h4>
                                                </div>
                                                <div className="space-y-3">
                                                    {summaryInsights.top3FGMachines.map((m, idx) => (
                                                        <div key={m.machine} className="bg-white p-3 rounded shadow-sm border border-emerald-50">
                                                            <div className="flex justify-between items-center mb-1">
                                                                <span className="font-bold text-gray-800">อันดับ {idx + 1}: {m.machine}</span>
                                                                <span className="text-emerald-700 font-bold">{formatNum(m.fgKg)} kg</span>
                                                            </div>
                                                            <div className="text-sm text-gray-600 space-y-1">
                                                                <p>📌 งานหลัก: ลูกค้า <span className="font-medium">{m.topCustomer}</span> ขนาด <span className="font-medium">{m.topSize}</span></p>
                                                                <p className="text-xs">
                                                                    เศษเสีย <span className="text-red-500">{formatNum(m.scrapKg)} kg ({formatNum(m.scrapPercent)}%)</span> | 
                                                                    ม้วนแก้ไข <span className="text-orange-500">{formatNum(m.reworkKg)} kg ({formatNum(m.reworkPercent)}%)</span>
                                                                </p>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        )}

                                        {/* Top 3 Worst Machines Insight */}
                                        {summaryInsights.top3LossMachines.length > 0 && (
                                            <div className="bg-red-50/70 p-4 rounded-lg border border-red-100 h-full flex flex-col">
                                                <div className="flex items-center gap-2 mb-3 shrink-0">
                                                    <span className="text-2xl">⚠️</span>
                                                    <h4 className="font-bold text-red-800 text-lg">3 อันดับเครื่องจักรที่ควรเฝ้าระวัง (สูญเสียสูงสุด)</h4>
                                                </div>
                                                <div className="space-y-3 flex-grow overflow-y-auto pr-1">
                                                    {summaryInsights.top3LossMachines.map((m, idx) => (
                                                        <div key={m.machine} className="bg-white p-3 rounded shadow-sm border border-red-50">
                                                            <div className="flex justify-between items-center mb-1">
                                                                <span className="font-bold text-gray-800">อันดับ {idx + 1}: {m.machine}</span>
                                                                <span className="text-red-700 font-bold">{formatNum(m.scrapKg + m.reworkKg)} kg <span className="text-xs font-normal text-gray-500">({formatNum(m.lossPercent)}%)</span></span>
                                                            </div>
                                                            <div className="text-sm text-gray-600 space-y-2">
                                                                <p>📌 งานหลักที่เสีย: ลูกค้า <span className="font-medium">{m.topCustomer}</span> ขนาด <span className="font-medium">{m.topSize}</span></p>
                                                                <p className="text-xs">
                                                                    เศษเสีย <span className="text-red-500">{formatNum(m.scrapKg)} kg ({formatNum(m.scrapPercent)}%)</span> | 
                                                                    ม้วนแก้ไข <span className="text-orange-500">{formatNum(m.reworkKg)} kg ({formatNum(m.reworkPercent)}%)</span>
                                                                </p>
                                                                
                                                                {/* Top 5 Symptoms for this machine */}
                                                                {m.topSymptomsList && m.topSymptomsList.length > 0 && (
                                                                    <div className="mt-2 pt-2 border-t border-gray-100">
                                                                        <p className="text-xs font-semibold text-gray-700 mb-1">🔧 5 อันดับอาการสูญเสียสูงสุด:</p>
                                                                        <ul className="text-xs space-y-1">
                                                                            {m.topSymptomsList.map((sym, sIdx) => (
                                                                                <li key={sIdx} className="flex justify-between items-start">
                                                                                    <span className="text-purple-600 w-3/5 break-words pr-2">- {sym.symptom}</span>
                                                                                    <span className="text-gray-500 font-medium text-right shrink-0">
                                                                                        {formatNum(sym.weight)} kg ({formatNum(sym.percentOfMachineLoss)}%)
                                                                                    </span>
                                                                                </li>
                                                                            ))}
                                                                        </ul>
                                                                    </div>
                                                                )}
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                </div>
                            )}

                            {/* Charts Grid */}
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                
                                {/* Chart 1: Scrap & Rework vs FG by Machine */}
                                <div className="bg-white p-5 rounded-xl shadow-sm lg:col-span-2">
                                    <div className="flex justify-between items-center mb-4">
                                        <h3 className="text-lg font-bold text-gray-800">ประสิทธิภาพรายเครื่องจักร (BL01 - BL11)</h3>
                                        <span className="text-xs font-medium text-blue-600 bg-blue-50 px-2 py-1 rounded-md">👉 คลิกที่แท่งกราฟเศษเสียเพื่อดูรายละเอียดปัญหา</span>
                                    </div>
                                    <div className="h-80">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <ComposedChart data={machineStats} margin={{ top: 10, right: 30, left: 0, bottom: 0 }}>
                                                <CartesianGrid strokeDasharray="3 3" vertical={false} />
                                                <XAxis dataKey="name" />
                                                <YAxis yAxisId="left" tickFormatter={(val) => formatNum(val,0)} />
                                                <YAxis yAxisId="right" orientation="right" tickFormatter={(val) => formatNum(val,0)} />
                                                <Tooltip formatter={(value) => formatNum(value) + ' kg'} />
                                                <Legend />
                                                <Bar yAxisId="left" dataKey="Scrap" name="เศษเสีย (kg)" stackId="a" fill="#ef4444" radius={[0, 0, 0, 0]} onClick={openMachineDetails} cursor="pointer" />
                                                <Bar yAxisId="left" dataKey="Rework" name="ม้วนรอแก้ไข (kg)" stackId="a" fill="#f97316" radius={[4, 4, 0, 0]} onClick={openMachineDetails} cursor="pointer" />
                                                <Line yAxisId="right" type="monotone" dataKey="FG" name="FG (kg)" stroke="#3b82f6" strokeWidth={3} dot={{r:4}} />
                                            </ComposedChart>
                                        </ResponsiveContainer>
                                    </div>
                                </div>

                                {/* Chart 2: All Customers overall */}
                                <div className="bg-white p-5 rounded-xl shadow-sm">
                                    <h3 className="text-lg font-bold text-gray-800 mb-4">ลูกค้ายอดผลิตสูงสุด (ทั้งหมดเรียงจากมากไปน้อย)</h3>
                                    <div className="h-[400px] overflow-y-auto custom-scrollbar pr-2 border rounded-lg bg-gray-50/50">
                                        <div style={{ height: Math.max(380, customerStats.length * 45) }}>
                                            <ResponsiveContainer width="100%" height="100%">
                                                <BarChart data={customerStats} layout="vertical" margin={{ top: 10, right: 30, left: 20, bottom: 10 }}>
                                                    <CartesianGrid strokeDasharray="3 3" horizontal={true} vertical={false} />
                                                    <XAxis type="number" tickFormatter={(val) => formatNum(val,0)} />
                                                    <YAxis dataKey="name" type="category" width={90} tick={{fontSize: 12}} interval={0} />
                                                    <Tooltip content={<CustomerTooltip />} cursor={{fill: 'transparent'}} />
                                                    <Bar dataKey="FG" name="FG (kg)" fill="#8b5cf6" radius={[0, 4, 4, 0]} onClick={openCustomerDetails} cursor="pointer">
                                                        {customerStats.map((entry, index) => (
                                                            <Cell key={`cell-${index}`} fill={['#8b5cf6','#6366f1','#3b82f6','#0ea5e9','#06b6d4'][index % 5]} />
                                                        ))}
                                                    </Bar>
                                                </BarChart>
                                            </ResponsiveContainer>
                                        </div>
                                    </div>
                                </div>

                                {/* Chart 3: Top Symptoms / Causes */}
                                <div className="bg-white p-5 rounded-xl shadow-sm">
                                    <div className="flex justify-between items-center mb-4">
                                        <h3 className="text-lg font-bold text-gray-800">อาการและสาเหตุปัญหาสูงสุด (จากมากไปน้อย)</h3>
                                        <span className="text-xs font-medium text-red-600 bg-red-50 px-2 py-1 rounded-md">👉 คลิกที่แท่งกราฟเพื่อดูรายละเอียด</span>
                                    </div>
                                    <div className="h-[400px] overflow-y-auto custom-scrollbar pr-2 border rounded-lg bg-gray-50/50">
                                        <div style={{ height: Math.max(380, problemStats.length * 45) }}>
                                            <ResponsiveContainer width="100%" height="100%">
                                                <BarChart data={problemStats} layout="vertical" margin={{ top: 10, right: 30, left: 10, bottom: 10 }}>
                                                    <CartesianGrid strokeDasharray="3 3" horizontal={true} vertical={false} />
                                                    <XAxis type="number" tickFormatter={(val) => formatNum(val,0)} />
                                                    <YAxis dataKey="name" type="category" width={140} tick={{fontSize: 11}} interval={0} />
                                                    <Tooltip content={<ProblemTooltip />} cursor={{fill: '#fee2e2'}} />
                                                    <Bar dataKey="lossKg" name="สูญเสีย (kg)" fill="#ef4444" radius={[0, 4, 4, 0]} onClick={openProblemDetails} cursor="pointer" />
                                                </BarChart>
                                            </ResponsiveContainer>
                                        </div>
                                    </div>
                                </div>

                            </div>

                            {/* Customer & Size Details Table */}
                            <div className="bg-white p-5 rounded-xl shadow-sm">
                                <h3 className="text-lg font-bold text-gray-800 mb-4">ตารางสรุปยอดผลิตแยกตามลูกค้าและขนาด</h3>
                                <div className="overflow-x-auto rounded-lg border border-gray-200">
                                    <div className="max-h-[500px] overflow-y-auto custom-scrollbar">

                                            <thead className="sticky top-0 bg-gray-100 shadow-sm z-10">
                                                <tr className="text-gray-700 text-sm">
                                                    <th className="p-3 border-b border-r bg-gray-100 font-bold w-28">วันที่ผลิต</th>
                                                    <th className="p-3 border-b border-r bg-gray-100 font-bold">ลูกค้า</th>
                                                    <th className="p-3 border-b border-r bg-gray-100 font-bold">ขนาด</th>
                                                    <th className="p-3 border-b border-r bg-gray-100 font-bold text-right text-blue-700">FG (kg)</th>
                                                    <th className="p-3 border-b border-r bg-gray-100 font-bold text-right text-red-600">เศษเสีย (kg)</th>
                                                    <th className="p-3 border-b border-r bg-gray-100 font-bold text-right text-red-500">% เศษเสีย</th>
                                                    <th className="p-3 border-b border-r bg-gray-100 font-bold text-right text-orange-500">ม้วนแก้ไข (kg)</th>
                                                    <th className="p-3 border-b border-r bg-gray-100 font-bold text-right text-orange-400">% ม้วนแก้ไข</th>
                                                    <th className="p-3 border-b bg-gray-100 font-bold text-right text-purple-600">% ต่อภาพรวม (เทียบ FG รวม)</th>
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {customerSizeDateTableData.map((row, i) => (
                                                    <tr key={i} className="border-b hover:bg-gray-50 text-sm transition-colors">

                                                        <td className="p-3 border-r text-gray-600">{row.size}</td>
                                                        <td className="p-3 border-r text-right text-blue-600 font-medium">{formatNum(row.FG)}</td>
                                                        <td className="p-3 border-r text-right text-red-500">{formatNum(row.Scrap)}</td>
                                                        <td className="p-3 border-r text-right text-red-400">{formatNum(row.percentScrap)}%</td>
                                                        <td className="p-3 border-r text-right text-orange-500">{formatNum(row.Rework)}</td>
                                                        <td className="p-3 border-r text-right text-orange-400">{formatNum(row.percentRework)}%</td>
                                                        <td className="p-3 text-right text-purple-600 font-medium">{formatNum(row.percentOverall)}%</td>
                                                    </tr>
                                                ))}

                                                    <tr>
                                                        <td colSpan="9" className="p-6 text-center text-gray-500">ไม่มีข้อมูลที่ตรงกับเงื่อนไข</td>
                                                    </tr>
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* ======================= TAB 2: COMPARISON ======================= */}
                    {activeTab === 'comparison' && (
                        <div className="flex flex-col gap-6 animate-[fadeIn_0.3s_ease-in-out]">
                            {/* Date Selectors */}
                            <div className="bg-white p-5 rounded-xl shadow-sm">

                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    <div className="bg-blue-50/50 p-4 rounded-lg border border-blue-100">
                                        <h4 className="font-semibold text-blue-800 mb-3">ช่วงเวลาที่ 1 (Period A)</h4>
                                        <div className="flex gap-4">
                                            <div className="flex-1">
                                                <label className="text-xs text-gray-500 mb-1 block">ตั้งแต่วันที่</label>
                                                <input type="date" className="w-full border border-blue-200 rounded p-2 text-sm" value={compA.start} onChange={e => setCompA({...compA, start: e.target.value})} />
                                            </div>
                                            <div className="flex-1">
                                                <label className="text-xs text-gray-500 mb-1 block">ถึงวันที่</label>
                                                <input type="date" className="w-full border border-blue-200 rounded p-2 text-sm" value={compA.end} onChange={e => setCompA({...compA, end: e.target.value})} />
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div className="bg-purple-50/50 p-4 rounded-lg border border-purple-100">
                                        <h4 className="font-semibold text-purple-800 mb-3">ช่วงเวลาที่ 2 (Period B)</h4>
                                        <div className="flex gap-4">
                                            <div className="flex-1">
                                                <label className="text-xs text-gray-500 mb-1 block">ตั้งแต่วันที่</label>

                                            </div>
                                            <div className="flex-1">
                                                <label className="text-xs text-gray-500 mb-1 block">ถึงวันที่</label>
                                                <input type="date" className="w-full border border-purple-200 rounded p-2 text-sm" value={compB.end} onChange={e => setCompB({...compB, end: e.target.value})} />
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* Comparison Summary Cards */}
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                {/* FG Comparison */}
                                <div className="bg-white p-5 rounded-xl shadow-sm border-t-4 border-blue-500">
                                    <h3 className="text-gray-500 font-semibold mb-2">FG Comparison (kg)</h3>
                                    <div className="flex justify-between items-end mb-4 border-b pb-4">
                                        <div>
                                            <p className="text-xs text-gray-400">ช่วงเวลา 1</p>
                                            <p className="text-xl font-bold text-gray-800">{formatNum(kpisA.fgKg)}</p>
                                        </div>
                                        <div className="text-right">
                                            <p className="text-xs text-gray-400">ช่วงเวลา 2</p>
                                            <p className="text-xl font-bold text-gray-800">{formatNum(kpisB.fgKg)}</p>
                                        </div>
                                    </div>
                                    {(() => {
